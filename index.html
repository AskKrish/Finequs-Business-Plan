<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finequs — Business Plan Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase SDKs — must load before any app script -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --navy: #0D2B5E;
  --navy-light: #1a3a7a;
  --navy-dark: #081d42;
  --red: #E63329;
  --green-accent: #2BA84A;
  --gold: #C8860A;
  --bg: #F4F6FA;
  --surface: #FFFFFF;
  --surface2: #F0F3F9;
  --border: #DDE3EF;
  --border-strong: #BBC5DC;
  --text-primary: #0D1B3E;
  --text-secondary: #5A6780;
  --text-muted: #8A96AB;
  --success-bg: #EAF7ED;
  --success-text: #1a7a35;
  --warning-bg: #FFF8E6;
  --warning-text: #8a5d00;
  --danger-bg: #FEECEB;
  --danger-text: #C0201A;
  --info-bg: #EBF2FF;
  --info-text: #1a3a7a;
  --shadow-sm: 0 1px 3px rgba(13,43,94,0.08);
  --shadow-md: 0 4px 16px rgba(13,43,94,0.10);
  --shadow-lg: 0 8px 32px rgba(13,43,94,0.13);
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  box-shadow: var(--shadow-md);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-img { height: 32px; filter: brightness(0) invert(1); }
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-badge {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-left: 1px solid rgba(255,255,255,0.2);
  padding-left: 16px;
}
.header-tag {
  font-size: 10px;
  font-weight: 600;
  color: var(--navy);
  background: #fff;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

/* ── TABS ── */
.tab-bar {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  padding: 0 32px;
  gap: 0;
  box-shadow: var(--shadow-sm);
}
.tab-btn {
  padding: 14px 24px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer;
  margin-bottom: -1.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.tab-btn:hover { color: var(--navy); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 600; }
.tab-icon { font-size: 15px; }

/* ── LAYOUT ── */
.main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
.pane { display: none; }
.pane.active { display: block; }

/* ── SECTION HEADING ── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.section-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 18px;
  background: var(--navy);
  border-radius: 2px;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-header {
  background: var(--surface2);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.card-header-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-secondary);
}

/* ── COST TABLE ── */
.cost-wrap { margin-bottom: 20px; }
.cost-group-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 10px 18px 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--info-bg);
  border-bottom: 1px solid var(--border);
}
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th {
  background: var(--surface2);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 8px 10px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.tbl th:first-child { text-align: left; min-width: 160px; }
.tbl td {
  padding: 5px 6px;
  border-bottom: 1px solid var(--border);
  text-align: right;
  vertical-align: middle;
}
.tbl td:first-child { text-align: left; }
.tbl tr:last-child td { border-bottom: none; }
.tbl .subtot td {
  font-weight: 600;
  background: var(--surface2);
  color: var(--navy);
  font-size: 12px;
}
.tbl .grandtot td {
  font-weight: 700;
  background: var(--navy);
  color: #fff;
  font-size: 13px;
}
input.name-f {
  width: 150px;
  font-size: 12px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
}
input.amt-f {
  width: 82px;
  font-size: 12px;
  padding: 5px 7px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-primary);
  text-align: right;
  font-family: 'DM Mono', monospace;
  -moz-appearance: textfield;
}
input.amt-f::-webkit-outer-spin-button,
input.amt-f::-webkit-inner-spin-button { -webkit-appearance: none; }
input.amt-f:focus, input.name-f:focus {
  outline: none;
  border-color: var(--navy);
  box-shadow: 0 0 0 2px rgba(13,43,94,0.1);
}
.del-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}
.del-btn:hover { color: var(--red); background: var(--danger-bg); }
.add-row-btn {
  font-size: 11px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1.5px dashed var(--border-strong);
  border-radius: 6px;
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  margin: 8px 18px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Sans', sans-serif;
}
.add-row-btn:hover { background: var(--info-bg); color: var(--navy); border-color: var(--navy); }
.add-group-btn {
  font-size: 12px;
  font-weight: 500;
  padding: 8px 18px;
  border: 1.5px dashed var(--border-strong);
  border-radius: 8px;
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Sans', sans-serif;
}
.add-group-btn:hover { background: var(--info-bg); color: var(--navy); border-color: var(--navy); }

/* ── MONTH PILLS ── */
.month-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.mpill {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  border: 1.5px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-secondary);
  font-family: 'DM Sans', sans-serif;
  position: relative;
  transition: all 0.15s;
}
.mpill:hover { border-color: var(--navy); color: var(--navy); }
.mpill.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(13,43,94,0.3);
}
.mpill.hit { border-color: var(--green-accent); color: var(--green-accent); background: var(--success-bg); }
.mpill.active.hit { background: var(--green-accent); border-color: var(--green-accent); color: #fff; }
.saved-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green-accent);
  margin-left: 5px;
  vertical-align: middle;
}

/* ── SEGMENT BLOCKS ── */
.seg-wrap { margin-bottom: 14px; }
.seg-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.seg-top {
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.seg-top.big { background: linear-gradient(135deg, #EBF2FF 0%, #dceaff 100%); border-bottom: 1px solid #c0d4f7; }
.seg-top.med { background: linear-gradient(135deg, #FFF8E6 0%, #ffefc8 100%); border-bottom: 1px solid #f0d890; }
.seg-top.sm  { background: linear-gradient(135deg, #EAF7ED 0%, #d0f0d8 100%); border-bottom: 1px solid #a8ddb4; }
.seg-top.custom { background: linear-gradient(135deg, var(--surface2) 0%, #e8edf8 100%); border-bottom: 1px solid var(--border); }
.seg-top.saas { background: linear-gradient(135deg, #f0ebff 0%, #e2d8f8 100%); border-bottom: 1px solid #c8b8f0; }
.seg-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}
.badge-big { background: var(--navy); color: #fff; }
.badge-med { background: var(--gold); color: #fff; }
.badge-sm  { background: var(--green-accent); color: #fff; }
.badge-custom { background: var(--text-secondary); color: #fff; }
.badge-saas { background: #6E3FBC; color: #fff; }
.seg-margin-lbl { font-size: 12px; color: var(--text-secondary); }
.seg-margin-lbl strong { color: var(--navy); font-weight: 700; font-size: 14px; }
.seg-body { padding: 14px 18px; background: var(--surface); }
.prod-divider {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 0 6px;
  border-top: 1px solid var(--border);
  margin-top: 12px;
}
.prod-divider:first-child { border-top: none; margin-top: 0; padding-top: 0; }

/* ── PARAM GRID ── */
.param-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0,1fr));
  gap: 8px;
  margin-bottom: 8px;
}
.param-grid-4 {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 8px;
}
.pfield { display: flex; flex-direction: column; gap: 4px; }
.pfield label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.pfield input {
  width: 100%;
  font-size: 13px;
  padding: 7px 9px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: var(--surface);
  color: var(--text-primary);
  text-align: right;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  -moz-appearance: textfield;
}
.pfield input::-webkit-outer-spin-button,
.pfield input::-webkit-inner-spin-button { -webkit-appearance: none; }
.pfield input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(13,43,94,0.1); }

/* ── OUTPUT GRID ── */
.out-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 6px;
  margin-top: 4px;
}
.ocard {
  background: var(--surface2);
  border-radius: 8px;
  padding: 8px 10px;
  border: 1px solid var(--border);
}
.ocard.hi { background: var(--info-bg); border-color: #b8cef5; }
.ocard .ol { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 3px; }
.ocard .ov { font-size: 14px; font-weight: 700; color: var(--navy); font-family: 'DM Mono', monospace; }
.ocard.hi .ov { color: var(--navy-light); }

/* ── REV SUMMARY ── */
.rev-kpi-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px;
  margin: 16px 0;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
}
.kpi-card .kl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px; }
.kpi-card .kv { font-size: 20px; font-weight: 700; color: var(--navy); font-family: 'DM Mono', monospace; }
.kpi-card .ks { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* ── NET BAR ── */
.net-bar {
  border-radius: var(--radius);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  border: 1px solid transparent;
}
.net-s { background: var(--success-bg); border-color: #8ad49a; }
.net-d { background: var(--danger-bg); border-color: #f0a8a5; }
.net-w { background: var(--warning-bg); border-color: #e0c870; }
.net-lbl { font-size: 15px; font-weight: 700; color: var(--navy); }
.net-s .net-lbl { color: var(--success-text); }
.net-d .net-lbl { color: var(--danger-text); }
.net-w .net-lbl { color: var(--warning-text); }

/* ── SAVE BAR ── */
.save-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 12px;
  flex-wrap: wrap;
  gap: 10px;
}
.save-status { font-size: 12px; color: var(--text-muted); }
.save-status.saved { color: var(--success-text); font-weight: 600; }
.btn-nav {
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 7px;
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-nav:hover { background: var(--surface2); color: var(--navy); border-color: var(--navy); }
.btn-save {
  font-size: 12px;
  font-weight: 600;
  padding: 7px 18px;
  border: none;
  border-radius: 7px;
  background: var(--navy);
  color: #fff;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-save:hover { background: var(--navy-light); }
.btn-save-next {
  font-size: 12px;
  font-weight: 600;
  padding: 7px 18px;
  border: none;
  border-radius: 7px;
  background: var(--green-accent);
  color: #fff;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-save-next:hover { background: #22913e; }
.btn-group { display: flex; gap: 8px; align-items: center; }

/* ── SUMMARY ── */
.sum-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.sum-tbl th {
  background: var(--navy);
  color: rgba(255,255,255,0.85);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 9px 10px;
  text-align: right;
  white-space: nowrap;
}
.sum-tbl th:first-child { text-align: left; border-radius: 8px 0 0 0; }
.sum-tbl th:last-child { border-radius: 0 8px 0 0; }
.sum-tbl td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: right; }
.sum-tbl td:first-child { text-align: left; font-size: 11px; color: var(--text-secondary); }
.sum-tbl .row-rev td { color: var(--text-primary); }
.sum-tbl .row-gm td { font-weight: 700; background: var(--surface2); border-top: 1.5px solid var(--border-strong); font-size: 13px; color: var(--navy); }
.sum-tbl .row-cost td { color: var(--text-muted); }
.sum-tbl .row-net td { font-weight: 800; font-size: 14px; border-top: 2px solid var(--navy-dark); background: var(--info-bg); }
.sum-tbl .row-cash td { font-weight: 600; font-size: 11px; }
.sum-tbl .row-ops td { color: var(--text-muted); font-size: 11px; }
.pos { color: var(--success-text) !important; font-family: 'DM Mono', monospace; }
.neg { color: var(--danger-text) !important; font-family: 'DM Mono', monospace; }
.mono { font-family: 'DM Mono', monospace; }
.hit-cell { background: var(--success-bg) !important; color: var(--success-text) !important; font-weight: 700; border-radius: 4px; font-family: 'DM Mono', monospace; }
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ── SCENARIO CONTROLS ── */
.scenario-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.scenario-bar input {
  font-size: 12px;
  padding: 7px 12px;
  border: 1.5px solid var(--border-strong);
  border-radius: 7px;
  background: var(--surface);
  color: var(--text-primary);
  width: 200px;
  font-family: 'DM Sans', sans-serif;
}
.scenario-bar input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(13,43,94,0.1); }
.scenario-bar button {
  font-size: 12px;
  font-weight: 600;
  padding: 7px 16px;
  border: none;
  border-radius: 7px;
  background: var(--navy);
  color: #fff;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.scenario-bar button.sec { background: var(--surface); color: var(--navy); border: 1.5px solid var(--border-strong); }
.scenario-bar button:hover { opacity: 0.88; }
.saved-list { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.sc-pill { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: var(--success-bg); color: var(--success-text); border: 1px solid #8ad49a; }

/* ── KPI SUMMARY ── */
.kpi-row3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-top: 16px; }
.kpi3 { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow-sm); }
.kpi3 .k3l { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 6px; }
.kpi3 .k3v { font-size: 22px; font-weight: 800; color: var(--navy); font-family: 'DM Mono', monospace; }

/* ── MISC ── */
.add-cs-btn {
  font-size: 12px;
  font-weight: 500;
  padding: 8px 16px;
  border: 1.5px dashed var(--border-strong);
  border-radius: 8px;
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  margin-bottom: 12px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Sans', sans-serif;
}
.add-cs-btn:hover { background: var(--info-bg); color: var(--navy); border-color: var(--navy); }
.month-heading {
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.month-heading .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--navy); }
.ovfl { overflow-x: auto; }
</style>
</head>
<body>

<script>
var MONTHS=['Apr 26','May 26','Jun 26','Jul 26','Aug 26','Sep 26','Oct 26','Nov 26','Dec 26','Jan 27','Feb 27','Mar 27'];
var TARGET=1000000;
var curMi=0;
var monthSaved=new Array(12).fill(false);

/* ══════════════════════════════
   COST DATA
══════════════════════════════ */
var cGroups=[
  {id:'g1',label:'Staff',rows:[
    {id:'r1',name:'Mohanasenthil',vals:[80000,80000,80000,80000,80000,80000,80000,80000,80000,80000,80000,80000]},
    {id:'r2',name:'Uthra Kumar',vals:[33000,33000,33000,33000,33000,33000,33000,33000,33000,33000,33000,33000]},
    {id:'r3',name:'Processing support',vals:[20000,20000,20000,20000,20000,20000,20000,20000,20000,20000,20000,20000]},
  ]},
  {id:'g2',label:'Infrastructure',rows:[
    {id:'r4',name:'Cloud hosting',vals:[25000,25000,25000,25000,25000,25000,25000,25000,25000,25000,25000,25000]},
    {id:'r5',name:'Travel / Mobile',vals:[15000,15000,15000,15000,15000,15000,15000,15000,15000,15000,15000,15000]},
  ]},
  {id:'g3',label:'Compliance',rows:[
    {id:'r6',name:'Auditor',vals:[40000,40000,40000,40000,40000,40000,40000,40000,40000,40000,40000,40000]},
  ]},
];
var rCnt=10, gCnt=5;

function cTotal(mi){
  var t=0;
  cGroups.forEach(function(g){g.rows.forEach(function(r){t+=r.vals[mi]||0;});});
  return t;
}

function renderCosts(){
  var h='';
  cGroups.forEach(function(g){
    h+='<div class="card cost-wrap"><div class="cost-group-title"><span>'+g.label+'</span>'+
    '<button class="del-btn" onclick="delCG(\''+g.id+'\')">✕ Remove Group</button></div>'+
    '<div class="ovfl"><table class="tbl"><thead><tr><th>Line Item</th>';
    MONTHS.forEach(function(m){h+='<th>'+m+'</th>';});
    h+='<th>Total</th><th></th></tr></thead><tbody>';
    g.rows.forEach(function(r,ri){
      var rt=r.vals.reduce(function(a,b){return a+(b||0);},0);
      h+='<tr><td><input class="name-f" type="text" value="'+r.name+'" onchange="upCN(\''+g.id+'\','+ri+',this.value)"></td>';
      r.vals.forEach(function(v,mi){
        h+='<td><input class="amt-f" type="text" inputmode="numeric" value="'+(v||'')+'" placeholder="0" oninput="upCA(\''+g.id+'\','+ri+','+mi+',this.value)" onfocus="this.select()"></td>';
      });
      h+='<td class="mono" style="font-weight:600;white-space:nowrap;font-size:12px;color:var(--navy)">₹'+fN(rt)+'</td>'+
      '<td><button class="del-btn" onclick="delCR(\''+g.id+'\','+ri+')">✕</button></td></tr>';
    });
    h+='</tbody><tfoot><tr class="subtot"><td>Subtotal — '+g.label+'</td>';
    MONTHS.forEach(function(_,mi){
      var t=g.rows.reduce(function(a,r){return a+(r.vals[mi]||0);},0);
      h+='<td class="mono">₹'+fN(t)+'</td>';
    });
    var gt=g.rows.reduce(function(a,r){return a+r.vals.reduce(function(b,v){return b+(v||0);},0);},0);
    h+='<td class="mono">₹'+fN(gt)+'</td><td></td></tr></tfoot></table></div>'+
    '<button class="add-row-btn" onclick="addCR(\''+g.id+'\')">＋ Add Line</button></div>';
  });
  // Grand total
  var gts=MONTHS.map(function(_,mi){return cTotal(mi);});
  h+='<div class="card cost-wrap" style="margin-top:14px">'+
  '<div class="ovfl"><table class="tbl"><thead><tr><th>Grand Total — All Costs</th>';
  MONTHS.forEach(function(m){h+='<th>'+m+'</th>';});
  h+='<th>Annual</th><th></th></tr></thead><tbody><tr class="grandtot"><td>Total Monthly Costs</td>';
  gts.forEach(function(t){h+='<td class="mono">₹'+fN(t)+'</td>';});
  h+='<td class="mono">₹'+fN(gts.reduce(function(a,b){return a+b;},0))+'</td><td></td></tr></tbody></table></div></div>';
  document.getElementById('cost-container').innerHTML=h;
}
function upCA(gid,ri,mi,v){var g=cGroups.find(function(x){return x.id===gid;});if(g){g.rows[ri].vals[mi]=parseInt(v.replace(/\D/g,''))||0;renderCosts();}}
function upCN(gid,ri,v){var g=cGroups.find(function(x){return x.id===gid;});if(g)g.rows[ri].name=v;}
function delCR(gid,ri){var g=cGroups.find(function(x){return x.id===gid;});if(g){g.rows.splice(ri,1);renderCosts();}}
function delCG(gid){cGroups=cGroups.filter(function(x){return x.id!==gid;});renderCosts();}
function addCR(gid){var g=cGroups.find(function(x){return x.id===gid;});if(g){rCnt++;g.rows.push({id:'r'+rCnt,name:'New item',vals:MONTHS.map(function(){return 0;})});renderCosts();}}
function addCostGroup(){
  var n=prompt('Category name:','Other');if(!n)return;
  gCnt++;cGroups.push({id:'cg'+gCnt,label:n,rows:[{id:'r'+(++rCnt),name:'New item',vals:MONTHS.map(function(){return 0;})}]});
  renderCosts();
}

/* ══════════════════════════════
   REVENUE DATA
══════════════════════════════ */
var fixDefs={
  big:{label:'Big DSAs',topCls:'big',badgeCls:'badge-big',hl:{d:10,b:12,t:50,pct:40,apd:20},pl:{d:10,b:20,t:5,pct:35,apd:50}},
  med:{label:'Medium DSAs',topCls:'med',badgeCls:'badge-med',hl:{d:5,b:15,t:40,pct:45,apd:8},pl:{d:8,b:30,t:5,pct:40,apd:20}},
  sm:{label:'Small / Direct DSAs',topCls:'sm',badgeCls:'badge-sm',hl:{d:3,b:20,t:30,pct:50,apd:4},pl:{d:5,b:40,t:4,pct:50,apd:15}},
};
var customSegs=[];
var csIdCnt=0;
var mData=[];
for(var _i=0;_i<12;_i++){
  var _mo={saas_n:50,saas_p:999};
  ['big','med','sm'].forEach(function(k){var s=fixDefs[k];_mo[k]={hl:Object.assign({},s.hl),pl:Object.assign({},s.pl)};});
  mData.push(_mo);
}
function getCD(mi,csid){
  if(!mData[mi]['cs'+csid])mData[mi]['cs'+csid]={hl:{d:0,b:20,t:50,pct:40,apd:10},pl:{d:0,b:35,t:5,pct:40,apd:20}};
  return mData[mi]['cs'+csid];
}
function calc(d,b,t,pct,apd){
  var disb=d*1e7,m=disb*(b/10000);
  var ac=t>0?Math.ceil(disb/(t*1e5)):0;
  var apps=pct>0?Math.ceil(ac/(pct/100)):0;
  var dsas=apd>0?Math.ceil(apps/apd):0;
  return{disb:disb,m:m,ac:ac,apps:apps,dsas:dsas};
}
function mRev(mi){
  var md=mData[mi],tm=0,td=0,ta=0,tds=0;
  function p(d,b,t,pct,apd){var r=calc(d,b,t,pct,apd);tm+=r.m;td+=r.disb;ta+=r.apps;tds+=r.dsas;}
  ['big','med','sm'].forEach(function(k){p(md[k].hl.d,md[k].hl.b,md[k].hl.t,md[k].hl.pct,md[k].hl.apd);p(md[k].pl.d,md[k].pl.b,md[k].pl.t,md[k].pl.pct,md[k].pl.apd);});
  customSegs.forEach(function(cs){var cd=getCD(mi,cs.id);p(cd.hl.d,cd.hl.b,cd.hl.t,cd.hl.pct,cd.hl.apd);p(cd.pl.d,cd.pl.b,cd.pl.t,cd.pl.pct,cd.pl.apd);});
  var sr=md.saas_n*md.saas_p;
  return{distM:tm,saasR:sr,total:tm+sr,totalDisb:td,totalApps:ta,totalDsas:tds};
}

/* ── PILLS ── */
function renderPills(){
  var h='<div class="month-strip">';
  MONTHS.forEach(function(m,i){
    var net=mRev(i).total-cTotal(i);
    var cls='mpill'+(i===curMi?' active':'')+(net>=TARGET?' hit':'');
    var dot=monthSaved[i]?'<span class="saved-dot"></span>':'';
    h+='<button class="'+cls+'" onclick="setMi('+i+')">'+m+dot+'</button>';
  });
  h+='</div>';
  document.getElementById('mpills-wrap').innerHTML=h;
}
function setMi(i){curMi=i;renderPills();renderRevMonth();}

/* ── PARAM HELPERS ── */
function pfield(lbl,fid,val){
  return '<div class="pfield"><label>'+lbl+'</label>'+
  '<input type="text" inputmode="numeric" id="'+fid+'" value="'+val+'" onfocus="this.select()" oninput="liveUp(\''+fid+'\',this.value)"></div>';
}
function outRow(pfx,r){
  return '<div class="out-row">'+
  '<div class="ocard"><div class="ol">Margin earned</div><div class="ov" id="o_'+pfx+'_m">'+fL(r.m)+'</div></div>'+
  '<div class="ocard"><div class="ol">Accounts disbursed</div><div class="ov" id="o_'+pfx+'_ac">'+r.ac+'</div></div>'+
  '<div class="ocard"><div class="ol">Applications to source</div><div class="ov" id="o_'+pfx+'_apps">'+r.apps+'</div></div>'+
  '<div class="ocard hi"><div class="ol">DSAs needed</div><div class="ov" id="o_'+pfx+'_dsas">'+r.dsas+'</div></div>'+
  '</div>';
}
function segBlock(sk,topCls,badgeCls,label,md,mi,isCustom){
  var rhl=calc(md.hl.d,md.hl.b,md.hl.t,md.hl.pct,md.hl.apd);
  var rpl=calc(md.pl.d,md.pl.b,md.pl.t,md.pl.pct,md.pl.apd);
  var sm=rhl.m+rpl.m;
  var delBtn=isCustom?'<button class="del-btn" style="font-size:11px;padding:2px 8px;border:1px solid #dde3ef;border-radius:5px" onclick="delCS('+isCustom+')">✕ Remove</button>':'';
  var pfxhl=sk+'_hl', pfxpl=sk+'_pl';
  return '<div class="seg-card seg-wrap">'+
  '<div class="seg-top '+topCls+'">'+
  '<div style="display:flex;align-items:center;gap:10px">'+
  '<span class="seg-badge '+badgeCls+'">'+label+'</span>'+delBtn+'</div>'+
  '<div class="seg-margin-lbl">Segment margin: <strong id="sm_'+sk+'">'+fL(sm)+'</strong></div>'+
  '</div>'+
  '<div class="seg-body">'+
  '<div class="prod-divider">HL / LAP</div>'+
  '<div class="param-grid">'+
  pfield('Disbursement (Cr)',pfxhl+'_d',md.hl.d)+
  pfield('Retention (bps)',pfxhl+'_b',md.hl.b)+
  pfield('Avg ticket (₹L)',pfxhl+'_t',md.hl.t)+
  pfield('Conversion %',pfxhl+'_pct',md.hl.pct)+
  pfield('Apps / DSA / month',pfxhl+'_apd',md.hl.apd)+
  '</div>'+outRow(pfxhl,rhl)+
  '<div class="prod-divider">PL / BL</div>'+
  '<div class="param-grid">'+
  pfield('Disbursement (Cr)',pfxpl+'_d',md.pl.d)+
  pfield('Retention (bps)',pfxpl+'_b',md.pl.b)+
  pfield('Avg ticket (₹L)',pfxpl+'_t',md.pl.t)+
  pfield('Conversion %',pfxpl+'_pct',md.pl.pct)+
  pfield('Apps / DSA / month',pfxpl+'_apd',md.pl.apd)+
  '</div>'+outRow(pfxpl,rpl)+
  '</div></div>';
}

function renderRevMonth(){
  var mi=curMi,md=mData[mi];
  var h='<div class="month-heading"><span class="dot"></span>'+MONTHS[mi]+' — Revenue Parameters</div>';
  ['big','med','sm'].forEach(function(k){
    var def=fixDefs[k];
    h+=segBlock(k,def.topCls,def.badgeCls,def.label,md[k],mi,false);
  });
  customSegs.forEach(function(cs){
    var cd=getCD(mi,cs.id);
    h+=segBlock('cs'+cs.id,'custom','badge-custom',cs.label,cd,mi,cs.id);
  });
  // SaaS
  var sr=md.saas_n*md.saas_p;
  h+='<div class="seg-card seg-wrap">'+
  '<div class="seg-top saas">'+
  '<span class="seg-badge badge-saas">CreditIQ SaaS — 100% Margin</span>'+
  '<div class="seg-margin-lbl">Revenue: <strong id="saas_lbl">'+fL(sr)+'</strong></div>'+
  '</div><div class="seg-body">'+
  '<div class="param-grid-4">'+
  pfield('Subscribers','saas_n',md.saas_n)+
  pfield('Price / month (₹)','saas_p',md.saas_p)+
  '<div class="ocard"><div class="ol">Monthly revenue</div><div class="ov" id="o_saas_r">'+fL(sr)+'</div></div>'+
  '<div class="ocard"><div class="ol">Annual run rate</div><div class="ov" id="o_saas_yr">'+fL(sr*12)+'</div></div>'+
  '</div></div></div>';

  // Summary KPIs
  var rev=mRev(mi),cost=cTotal(mi),net=rev.total-cost;
  var blend=rev.totalDisb>0?(rev.distM/rev.totalDisb*10000).toFixed(1):'—';
  h+='<div class="rev-kpi-row">'+
  '<div class="kpi-card"><div class="kl">Total disbursement</div><div class="kv" id="kv_disb">'+fCr(rev.totalDisb)+'</div></div>'+
  '<div class="kpi-card"><div class="kl">Gross margin</div><div class="kv" id="kv_gm">'+fL(rev.total)+'</div><div class="ks" id="kv_blend">blended '+blend+' bps on disbursement</div></div>'+
  '<div class="kpi-card"><div class="kl">Costs this month</div><div class="kv">'+fL(cost)+'</div></div>'+
  '<div class="kpi-card"><div class="kl">DSAs needed</div><div class="kv" id="kv_dsas">'+rev.totalDsas+'</div><div class="ks" id="kv_apps">'+rev.totalApps+' applications to source</div></div>'+
  '</div>';

  var nc=net>=TARGET?'net-s':net>=0?'net-w':'net-d';
  var nl=net>=TARGET?'✓ Net profit: '+fL(net)+' — target achieved':net>=0?'Surplus: '+fL(net)+' (below ₹10L target)':'Deficit: '+fL(Math.abs(net));
  var gl=net>=TARGET?'₹'+fL(net-TARGET)+' above ₹10L target':net>=0?'need ₹'+fL(TARGET-net)+' more to hit target':'need ₹'+fL(TARGET+Math.abs(net))+' more';
  h+='<div class="net-bar '+nc+'" id="net-bar"><div><div class="net-lbl" id="net-lbl">'+nl+'</div><div style="font-size:11px;margin-top:3px;color:var(--text-muted)">after all costs | monthly target: ₹10 Lakhs net</div></div><div style="text-align:right;font-size:12px;color:var(--text-muted)" id="net-gap">'+gl+'</div></div>';

  var savedNote=monthSaved[mi]?'<span class="save-status saved">✓ '+MONTHS[mi]+' saved</span>':'<span class="save-status">Unsaved — click Save to lock this month</span>';
  h+='<div class="save-bar">'+savedNote+'<div class="btn-group">'+
  (mi>0?'<button class="btn-nav" onclick="setMi('+(mi-1)+')">← '+MONTHS[mi-1]+'</button>':'')+
  '<button class="btn-save" onclick="saveMonth('+mi+')">Save '+MONTHS[mi]+'</button>'+
  (mi<11?'<button class="btn-save-next" onclick="saveAndNext('+mi+')">Save & Continue →</button>':'')+
  '</div></div>';
  document.getElementById('rev-content').innerHTML=h;
}

function liveUp(key,val){
  var mi=curMi,md=mData[mi],v=parseFloat(val.replace(/[^0-9.]/g,''))||0;
  if(key==='saas_n'){md.saas_n=v;}
  else if(key==='saas_p'){md.saas_p=v;}
  else{
    var pts=key.split('_');
    if(pts[0]==='cs'){
      var csid=parseInt(pts[1]),pr=pts[2],pm=pts[3];
      getCD(mi,csid)[pr][pm]=v;
      var r2=calc(getCD(mi,csid)[pr].d,getCD(mi,csid)[pr].b,getCD(mi,csid)[pr].t,getCD(mi,csid)[pr].pct,getCD(mi,csid)[pr].apd);
      updOut('cs'+csid+'_'+pr,r2);
      var cm=calc(getCD(mi,csid).hl.d,getCD(mi,csid).hl.b,getCD(mi,csid).hl.t,getCD(mi,csid).hl.pct,getCD(mi,csid).hl.apd).m+
             calc(getCD(mi,csid).pl.d,getCD(mi,csid).pl.b,getCD(mi,csid).pl.t,getCD(mi,csid).pl.pct,getCD(mi,csid).pl.apd).m;
      svo('sm_cs'+csid,fL(cm));
    } else {
      var sk=pts[0],pr2=pts[1],pm2=pts[2];
      if(md[sk]&&md[sk][pr2]){
        md[sk][pr2][pm2]=v;
        var r3=calc(md[sk][pr2].d,md[sk][pr2].b,md[sk][pr2].t,md[sk][pr2].pct,md[sk][pr2].apd);
        updOut(sk+'_'+pr2,r3);
        var sm2=calc(md[sk].hl.d,md[sk].hl.b,md[sk].hl.t,md[sk].hl.pct,md[sk].hl.apd).m+
                calc(md[sk].pl.d,md[sk].pl.b,md[sk].pl.t,md[sk].pl.pct,md[sk].pl.apd).m;
        svo('sm_'+sk,fL(sm2));
      }
    }
  }
  var sr=md.saas_n*md.saas_p;
  svo('o_saas_r',fL(sr));svo('o_saas_yr',fL(sr*12));svo('saas_lbl',fL(sr));
  var rev=mRev(mi),cost=cTotal(mi),net=rev.total-cost;
  var blend=rev.totalDisb>0?(rev.distM/rev.totalDisb*10000).toFixed(1):'—';
  svo('kv_disb',fCr(rev.totalDisb));svo('kv_gm',fL(rev.total));svo('kv_blend','blended '+blend+' bps on disbursement');
  svo('kv_dsas',rev.totalDsas);svo('kv_apps',rev.totalApps+' applications to source');
  var nb=document.getElementById('net-bar');
  if(nb){
    nb.className='net-bar '+(net>=TARGET?'net-s':net>=0?'net-w':'net-d');
    svo('net-lbl',net>=TARGET?'✓ Net profit: '+fL(net)+' — target achieved':net>=0?'Surplus: '+fL(net)+' (below ₹10L target)':'Deficit: '+fL(Math.abs(net)));
    svo('net-gap',net>=TARGET?'₹'+fL(net-TARGET)+' above ₹10L target':net>=0?'need ₹'+fL(TARGET-net)+' more':'need ₹'+fL(TARGET+Math.abs(net))+' more');
  }
  renderPills();
}
function updOut(pfx,r){svo('o_'+pfx+'_m',fL(r.m));svo('o_'+pfx+'_ac',r.ac);svo('o_'+pfx+'_apps',r.apps);svo('o_'+pfx+'_dsas',r.dsas);}
function svo(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
function saveMonth(mi){monthSaved[mi]=true;renderPills();renderRevMonth();saveToFirebase();}
function saveAndNext(mi){monthSaved[mi]=true;saveToFirebase();if(mi<11){curMi=mi+1;renderPills();renderRevMonth();}}
function addCS(){var n=prompt('Segment name (e.g. Corporate DSA):','Corporate DSA');if(!n)return;csIdCnt++;customSegs.push({id:csIdCnt,label:n});for(var i=0;i<12;i++)getCD(i,csIdCnt);renderRevMonth();}
function delCS(csid){customSegs=customSegs.filter(function(x){return x.id!==csid;});renderRevMonth();}

/* ══════════════════════════════
   SUMMARY
══════════════════════════════ */
var savedScenarios=[];
function renderSummary(){
  var rows=MONTHS.map(function(_,mi){
    var r=mRev(mi),c=cTotal(mi);
    return{rev:r.total,dm:r.distM,sr:r.saasR,cost:c,net:r.total-c,disb:r.totalDisb,apps:r.totalApps,dsas:r.totalDsas};
  });
  var h='<div class="card" style="padding:0"><div class="ovfl"><table class="sum-tbl"><thead><tr><th>Metric</th>';
  MONTHS.forEach(function(m){h+='<th>'+m+'</th>';});
  h+='<th>FY Total</th></tr></thead><tbody>';

  [{k:'dm',l:'Distribution margin',cls:'row-rev'},{k:'sr',l:'SaaS revenue',cls:'row-rev'},{k:'rev',l:'Total gross income',cls:'row-gm'},{k:'cost',l:'Total costs',cls:'row-cost'},{k:'net',l:'Net profit / (loss)',cls:'row-net',hl:1}].forEach(function(row){
    var ann=rows.reduce(function(a,t){return a+(t[row.k]||0);},0);
    h+='<tr class="'+row.cls+'"><td>'+row.l+'</td>';
    rows.forEach(function(t){
      var vv=t[row.k]||0;
      var cls='mono';
      if(row.hl){cls=vv>=TARGET?'hit-cell':vv>=0?'pos mono':'neg mono';}
      h+='<td class="'+cls+'">'+fL(vv)+'</td>';
    });
    h+='<td class="mono" style="font-weight:700">'+fL(ann)+'</td></tr>';
  });

  var cum=0;
  h+='<tr class="row-cash"><td>Cumulative cash position</td>';
  rows.forEach(function(t){cum+=t.net;h+='<td class="'+(cum>=0?'pos mono':'neg mono')+'">'+fL(cum)+'</td>';});
  h+='<td class="mono" style="font-weight:700">'+fL(cum)+'</td></tr>';
  h+='<tr class="row-ops"><td>Total disbursement</td>';
  var ad=0;rows.forEach(function(t){ad+=t.disb;h+='<td class="mono">'+fCr(t.disb)+'</td>';});
  h+='<td class="mono">'+fCr(ad)+'</td></tr>';
  h+='<tr class="row-ops"><td>Applications to source</td>';
  var aa=0;rows.forEach(function(t){aa+=t.apps;h+='<td>'+t.apps+'</td>';});
  h+='<td>'+aa+'</td></tr>';
  h+='<tr class="row-ops"><td>DSAs needed</td>';
  rows.forEach(function(t){h+='<td>'+t.dsas+'</td>';});
  h+='<td>—</td></tr>';
  h+='</tbody></table></div></div>';

  var fh=rows.findIndex(function(t){return t.net>=TARGET;});
  var mh=rows.filter(function(t){return t.net>=TARGET;}).length;
  var an=rows.reduce(function(a,t){return a+t.net;},0);

  h+='<div class="kpi-row3">'+
  '<div class="kpi3"><div class="k3l">First month hitting ₹10L target</div><div class="k3v '+(fh>=0?'pos':'neg')+'">'+(fh>=0?MONTHS[fh]:'Not reached')+'</div></div>'+
  '<div class="kpi3"><div class="k3l">Months hitting ₹10L target</div><div class="k3v">'+mh+' / 12</div></div>'+
  '<div class="kpi3"><div class="k3l">Annual net profit</div><div class="k3v '+(an>=0?'pos':'neg')+'">'+fL(an)+'</div></div>'+
  '</div>';

  if(savedScenarios.length>=2){
    h+='<div class="divider"></div>'+
    '<div class="section-title" style="margin-bottom:12px">Scenario Comparison</div>'+
    '<div class="card" style="padding:0"><div class="ovfl"><table class="sum-tbl"><thead><tr><th>Scenario</th>';
    MONTHS.forEach(function(m){h+='<th>'+m+'</th>';});
    h+='<th>Annual Net</th></tr></thead><tbody>';
    savedScenarios.forEach(function(sc){
      h+='<tr class="row-rev"><td style="font-weight:600;color:var(--navy)">'+sc.name+'</td>';
      sc.nets.forEach(function(n){
        var c=n>=TARGET?'hit-cell':n>=0?'pos mono':'neg mono';
        h+='<td class="'+c+'">'+fL(n)+'</td>';
      });
      h+='<td class="mono" style="font-weight:700">'+fL(sc.nets.reduce(function(a,b){return a+b;},0))+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  }
  document.getElementById('sum-content').innerHTML=h;
}
function saveScenario(){
  var name=document.getElementById('sc-name').value||('Scenario '+(savedScenarios.length+1));
  savedScenarios.push({name:name,nets:MONTHS.map(function(_,mi){return mRev(mi).total-cTotal(mi);})});
  document.getElementById('saved-list').innerHTML+=('<span class="sc-pill">✓ '+name+'</span> ');
  saveToFirebase();
  renderSummary();
}

function showTab(t){
  document.querySelectorAll('.tab-btn').forEach(function(e){e.classList.remove('active');});
  document.querySelectorAll('.pane').forEach(function(e){e.classList.remove('active');});
  document.querySelector('[onclick="showTab(\''+t+'\')"]').classList.add('active');
  document.getElementById('pane-'+t).classList.add('active');
  if(t==='revenue'){renderPills();renderRevMonth();}
  if(t==='summary'){renderSummary();}
}

/* ══════════════════════════════
   FORMAT HELPERS
══════════════════════════════ */
function fL(n){var l=n/100000;if(Math.abs(l)>=100)return'₹'+(l/100).toFixed(1)+'Cr';if(Math.abs(l)>=1)return'₹'+l.toFixed(2)+'L';return'₹'+Math.round(n/1000)+'K';}
function fCr(n){return'₹'+(n/1e7).toFixed(1)+' Cr';}
function fN(n){if(n>=100000)return(n/100000).toFixed(1)+'L';if(n>=1000)return Math.round(n/1000)+'K';return''+n;}


/* ══════════════════════════════
   FIREBASE INIT
   - Loads saved data on open
   - Live-syncs across all tabs
══════════════════════════════ */

function setSyncStatus(msg, color) {
  var el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color; }
}

// Firebase converts JS arrays to objects when stored — this converts them back
function toArray(val, fallback) {
  if (!val) return fallback;
  if (Array.isArray(val)) return val;
  // Object with numeric keys — convert to array
  var keys = Object.keys(val).map(Number).sort(function(a,b){return a-b;});
  return keys.map(function(k){ return val[k]; });
}

function applyData(d) {
  if (!d) return;
  // cGroups — array of groups, each with rows array and vals arrays
  if (d.cGroups) {
    cGroups = toArray(d.cGroups, cGroups).map(function(g) {
      g.rows = toArray(g.rows, []).map(function(r) {
        r.vals = toArray(r.vals, new Array(12).fill(0));
        return r;
      });
      return g;
    });
  }
  // mData — array of 12 month objects
  if (d.mData) {
    var raw = toArray(d.mData, mData);
    mData = raw.map(function(mo) {
      if (!mo) return mo;
      // each segment hl/pl has simple numeric props — no arrays inside
      return mo;
    });
  }
  if (d.monthSaved) monthSaved = toArray(d.monthSaved, monthSaved);
  if (d.customSegs) customSegs = toArray(d.customSegs, []);
  if (d.savedScenarios) {
    savedScenarios = toArray(d.savedScenarios, []).map(function(sc){
      if (sc) sc.nets = toArray(sc.nets, []);
      return sc;
    });
  }
}

firebase.initializeApp({
  databaseURL: "https://finequs-business-plan-default-rtdb.asia-southeast1.firebasedatabase.app"
});
var _db = firebase.database();
var _ROOT = 'bizplan';
var _firstLoad = true;

setSyncStatus('Loading…', '#b45309');

_db.ref(_ROOT + '/data').on('value', function(snap) {
  var d = snap.val();
  applyData(d);
  setSyncStatus('✓ Live', '#0a7c4e');

  renderCosts();
  renderPills();

  if (_firstLoad) {
    renderRevMonth();
    _firstLoad = false;
  } else {
    var revPane = document.getElementById('pane-revenue');
    var sumPane = document.getElementById('pane-summary');
    if (revPane && revPane.classList.contains('active')) renderRevMonth();
    if (sumPane && sumPane.classList.contains('active')) renderSummary();
  }

  // Rebuild saved scenarios pills in summary tab
  if (savedScenarios && savedScenarios.length) {
    var sl = document.getElementById('saved-list');
    if (sl) {
      sl.innerHTML = savedScenarios.map(function(sc){ return '<span class="sc-pill">✓ '+sc.name+'</span>'; }).join(' ');
    }
  }
}, function(err) {
  setSyncStatus('⚠ Offline — changes not saved', '#c8201a');
  renderCosts();
  renderPills();
  renderRevMonth();
});

function saveToFirebase() {
  setSyncStatus('Saving…', '#b45309');
  _db.ref(_ROOT + '/data').set({
    cGroups: cGroups,
    mData: mData,
    monthSaved: monthSaved,
    customSegs: customSegs,
    savedScenarios: savedScenarios
  }).then(function() {
    setSyncStatus('✓ Saved', '#0a7c4e');
  }).catch(function() {
    setSyncStatus('⚠ Save failed', '#c8201a');
  });
}
